<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>EU Compliance AI Assistant</title>
<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background-color: #0b0f19;
    color: #f1f5f9;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* ── LOGIN SCREEN ── */
  #loginScreen {
    width: 380px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    animation: fadeIn 0.4s ease forwards;
  }

  #loginScreen h1 {
    font-size: 22px;
    font-weight: 600;
    color: #f8fafc;
    letter-spacing: -0.02em;
    text-align: center;
    margin: 0 0 8px 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  #loginScreen h1::before {
    content: "";
    display: inline-block;
    width: 9px;
    height: 9px;
    background: #10b981;
    border-radius: 50%;
    box-shadow: 0 0 10px #10b981;
  }

  .login-field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .login-field label {
    font-size: 13px;
    color: #94a3b8;
    font-weight: 500;
    letter-spacing: 0.02em;
  }

  .login-field input {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 15px;
    color: #f8fafc;
    outline: none;
    font-family: inherit;
    transition: border-color 0.2s;
  }

  .login-field input:focus {
    border-color: #64748b;
    box-shadow: 0 0 0 2px rgba(100, 116, 139, 0.2);
  }

  .login-field input::placeholder {
    color: #475569;
  }

  #loginBtn {
    width: 100%;
    height: 46px;
    border: none;
    border-radius: 12px;
    background: #f8fafc;
    color: #0b0f19;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 4px;
    letter-spacing: -0.01em;
  }

  #loginBtn:hover {
    background: #cbd5e1;
  }

  #loginBtn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  #loginError {
    font-size: 13px;
    color: #fca5a5;
    text-align: center;
    min-height: 18px;
  }

  /* ── CHAT SCREEN ── */
  #chatScreen {
    display: none;
    width: 800px;
    max-width: 90%;
    flex-direction: column;
    height: 100vh;
    justify-content: center;
    transition: justify-content 0.5s ease;
    position: relative;
  }

  #chatScreen.visible {
    display: flex;
  }

  #chatScreen.chat-active {
    justify-content: flex-start;
    padding-top: 40px;
  }

  header {
    font-size: 24px;
    font-weight: 600;
    color: #f8fafc;
    letter-spacing: -0.02em;
    text-align: center;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    transition: all 0.5s ease;
  }

  header::before {
    content: "";
    display: inline-block;
    width: 10px;
    height: 10px;
    background: #10b981;
    border-radius: 50%;
    box-shadow: 0 0 12px #10b981;
  }

  /* Logout button στο header */
  .header-row {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 24px;
    position: relative;
    transition: all 0.5s ease;
  }

  #chatScreen.chat-active .header-row {
    justify-content: flex-start;
    margin-bottom: 16px;
  }

  #chatScreen.chat-active .header-row header {
    font-size: 18px;
    margin-bottom: 0;
  }

  #logoutBtn {
    position: absolute;
    right: 0;
    width: auto;
    height: 32px;
    padding: 0 14px;
    border: 1px solid #334155;
    border-radius: 20px;
    background: transparent;
    color: #94a3b8;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  #logoutBtn:hover {
    background: #1e293b;
    color: #f1f5f9;
    border-color: #64748b;
    transform: none;
  }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 10px 5px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    margin-bottom: 20px;
    opacity: 0;
    max-height: 0;
    transition: opacity 0.5s ease, max-height 0.5s ease;
  }

  #chatScreen.chat-active #chat {
    opacity: 1;
    max-height: calc(100vh - 180px);
  }

  .msg {
    padding: 4px 0;
    max-width: 100%;
    white-space: pre-wrap;
    font-size: 16px;
    line-height: 1.7;
    animation: fadeIn 0.3s ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .user {
    background: #1e293b;
    padding: 12px 20px;
    border-radius: 18px;
    max-width: 80%;
    margin-left: auto;
    color: #f8fafc;
  }

  .bot {
    color: #e2e8f0;
    margin-right: auto;
    border-left: 2px solid #334155;
    padding-left: 16px;
  }

  .bot-error {
    color: #fca5a5;
    border-left-color: #ef4444;
  }

  .msg code {
    background: #1e293b;
    padding: 3px 6px;
    border-radius: 6px;
    font-family: monospace;
    font-size: 14px;
    color: #38bdf8;
  }

  .source-text {
    display: block;
    font-size: 13px;
    font-weight: 500;
    margin-top: 12px;
    color: #94a3b8;
    font-style: italic;
  }

  .input-container {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 30px;
    padding: 8px 14px 8px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: all 0.3s ease;
    box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
  }

  .input-container:focus-within {
    border-color: #64748b;
    box-shadow: 0 0 0 2px rgba(100,116,139,0.2);
  }

  textarea {
    flex: 1;
    height: 24px;
    resize: none;
    border: none;
    background: transparent;
    font-size: 16px;
    font-family: inherit;
    color: #f8fafc;
    outline: none;
    padding: 2px 0;
  }

  textarea::placeholder { color: #64748b; }

  button {
    width: 40px;
    height: 40px;
    border: none;
    border-radius: 50%;
    background: #f8fafc;
    color: #0b0f19;
    font-weight: 600;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  button:hover { background: #cbd5e1; transform: scale(1.04); }

  button:disabled {
    opacity: 0.3;
    background: #475569;
    color: #94a3b8;
    cursor: not-allowed;
    transform: none;
  }

  #chat::-webkit-scrollbar { width: 6px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

  .typing-dots {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 8px 0;
  }

  .typing-dots span {
    width: 7px;
    height: 7px;
    background-color: #64748b;
    border-radius: 50%;
    animation: blink 1.4s infinite both;
  }

  .typing-dots span:nth-child(2) { animation-delay: .2s; }
  .typing-dots span:nth-child(3) { animation-delay: .4s; }

  @keyframes blink {
    0%   { opacity: .2; }
    20%  { opacity: 1;  }
    100% { opacity: .2; }
  }
</style>
</head>

<body>

<!-- ── LOGIN SCREEN ── -->
<div id="loginScreen">
  <h1>EU Compliance Assistant</h1>

  <div class="login-field">
    <label>Username</label>
    <input type="text" id="username" placeholder="compliance_officer" autocomplete="username" />
  </div>

  <div class="login-field">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
  </div>

  <div id="loginError"></div>

  <button id="loginBtn" onclick="login()">Sign in</button>
</div>

<!-- ── CHAT SCREEN ── -->
<div id="chatScreen">
  <div class="header-row">
    <header>EU Compliance AI Assistant</header>
    <button id="logoutBtn" onclick="logout()">Sign out</button>
  </div>

  <div id="chat"></div>

  <div class="input-container">
    <textarea id="input" placeholder="Ask anything about EU Compliance..." rows="1"></textarea>
    <button id="submitBtn" onclick="send()">➔</button>
  </div>
</div>

<script>
  const BASE_URL      = "http://localhost:8000";
  const LOGIN_URL     = `${BASE_URL}/auth/login`;
  const QUERY_URL     = `${BASE_URL}/retrieval/query`;
  const TOKEN_KEY     = "eu_compliance_token";

  const loginScreen   = document.getElementById("loginScreen");
  const chatScreen    = document.getElementById("chatScreen");
  const chat          = document.getElementById("chat");
  const submitBtn     = document.getElementById("submitBtn");
  const inputField    = document.getElementById("input");
  const loginError    = document.getElementById("loginError");
  const loginBtn      = document.getElementById("loginBtn");

  // ── Κατά το φόρτωμα: αν υπάρχει ήδη token, πήγαινε κατευθείαν στο chat ──
  window.addEventListener("load", () => {
    const token = sessionStorage.getItem(TOKEN_KEY);
    if (token) {
      showChatScreen();
    }
  });

  // ── Enter στο login ──
  document.getElementById("password").addEventListener("keydown", e => {
    if (e.key === "Enter") login();
  });

  // ── LOGIN ──
  async function login() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;
    loginError.textContent = "";

    if (!username || !password) {
      loginError.textContent = "Please enter username and password.";
      return;
    }

    loginBtn.disabled = true;
    loginBtn.textContent = "Signing in…";

    try {
      // Το /auth/login περιμένει OAuth2 form data, όχι JSON
      const formData = new URLSearchParams();
      formData.append("username", username);
      formData.append("password", password);

      const res = await fetch(LOGIN_URL, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: formData,
      });

      const data = await res.json();

      if (!res.ok) {
        loginError.textContent = data.detail || "Invalid credentials.";
        return;
      }

      // Αποθήκευση token στο sessionStorage (διαγράφεται όταν κλείσει το tab)
      sessionStorage.setItem(TOKEN_KEY, data.access_token);
      showChatScreen();

    } catch (e) {
      loginError.textContent = "Cannot reach the server. Is it running?";
    } finally {
      loginBtn.disabled = false;
      loginBtn.textContent = "Sign in";
    }
  }

  // ── LOGOUT ──
  function logout() {
    sessionStorage.removeItem(TOKEN_KEY);
    chat.innerHTML = "";
    chatScreen.classList.remove("visible", "chat-active");
    loginScreen.style.display = "flex";
    document.getElementById("username").value = "";
    document.getElementById("password").value = "";
  }

  // ── Εμφάνιση Chat ──
  function showChatScreen() {
    loginScreen.style.display = "none";
    chatScreen.classList.add("visible");
    inputField.focus();
  }

  // ── Textarea auto-resize ──
  inputField.addEventListener("input", function () {
    this.style.height = "24px";
    this.style.height = (this.scrollHeight - 6) + "px";
  });

  inputField.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  // ── Format bot response ──
  function formatBotResponse(text, sources = []) {
    if (!text) return "No response received.";

    let html = text
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");

    html = html.replace(/`(.*?)`/g, "<code>$1</code>");

    let sourcesHtml = "";
    if (sources && sources.length > 0) {
      const uniqueSources = new Set();
      sources.forEach(source => {
        const cleanSource = String(source || "").replace(/\r?\n|\r/g, " ");
        const fileMatch = cleanSource.match(/[^\\/,\s]+\.[a-zA-Z0-9]+/);
        const fileName  = fileMatch ? fileMatch[0].trim() : "document.pdf";
        const pageMatch = cleanSource.match(/Page\s*:?\s*(\d+)/i);
        const pageNum   = pageMatch ? pageMatch[1].trim() : "1";
        uniqueSources.add(`(Source: ${fileName}, Page: ${pageNum})`);
      });
      uniqueSources.forEach(s => {
        sourcesHtml += `<span class="source-text">${s}</span>`;
      });
    }

    return `${html}${sourcesHtml}`;
  }

  function addMessage(text, type, sources = []) {
    const div = document.createElement("div");
    div.className = "msg " + type;
    if (type === "bot") {
      div.innerHTML = formatBotResponse(text, sources);
    } else {
      div.innerText = text;
    }
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  // ── SEND QUERY ──
  async function send() {
    const text = inputField.value.trim();
    if (!text) return;

    const token = sessionStorage.getItem(TOKEN_KEY);

    // Αν δεν υπάρχει token, πήγαινε πίσω στο login
    if (!token) {
      logout();
      return;
    }

    if (!chatScreen.classList.contains("chat-active")) {
      chatScreen.classList.add("chat-active");
    }

    addMessage(text, "user");
    inputField.value = "";
    inputField.style.height = "24px";
    submitBtn.disabled = true;

    const loading = document.createElement("div");
    loading.className = "msg bot";
    loading.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
    chat.appendChild(loading);
    chat.scrollTop = chat.scrollHeight;

    try {
      const res = await fetch(QUERY_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${token}`,   // ← το JWT token σε κάθε request
        },
        body: JSON.stringify({ query: text }),
      });

      loading.remove();

      // Αν το token έχει λήξει (401), πήγαινε στο login
      if (res.status === 401) {
        sessionStorage.removeItem(TOKEN_KEY);
        addMessage("Session expired. Please sign in again.", "bot bot-error");
        setTimeout(logout, 1500);
        return;
      }

      const data = await res.json();

      if (res.ok) {
        addMessage(data.answer, "bot", data.sources);
      } else {
        const errorMsg = data.detail ? JSON.stringify(data.detail) : "Server error.";
        addMessage("Error: " + errorMsg, "bot bot-error");
      }

    } catch (e) {
      loading.remove();
      const errorDiv = document.createElement("div");
      errorDiv.className = "msg bot bot-error";
      errorDiv.innerText = "Error: " + e.message;
      chat.appendChild(errorDiv);
      chat.scrollTop = chat.scrollHeight;
    } finally {
      submitBtn.disabled = false;
      inputField.focus();
    }
  }
</script>

</body>
</html>
